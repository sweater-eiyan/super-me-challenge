<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SUPER ME CHALLENGE</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:monospace}canvas{display:block;image-rendering:pixelated}</style></head><body><canvas id="c"></canvas><script>const W=480,H=480;const c=document.getElementById('c');c.width=W;c.height=H;const ctx=c.getContext('2d');const ITEMS=[{name:'Logo Don Tee',price:'$48',diff:'EASY',time:45},{name:'BOXLOGO Hoodie',price:'$168',diff:'NORMAL',time:30},{name:'Limited Collab',price:'$398',diff:'HARD',time:20}];const QS=[{q:'SELECT ALL SQUARES\nWITH TRAFFIC LIGHTS',type:'grid',answer:1},{q:'SELECT ALL SQUARES\nWITH CHECKOUT BUTTONS',type:'grid',answer:1},{q:'FINAL VERIFICATION:\nARE YOU HUMAN?',type:'check'},{q:'SELECT ALL SQUARES\nWITH CROSSWALKS',type:'grid',answer:2},{q:'SELECT ALL SQUARES\nWITH FIRE HYDRANTS',type:'grid',answer:1},{q:'CLICK THE VERIFY\nBUTTON BELOW',type:'click'},{q:'SELECT ALL SQUARES\nWITH BICYCLES',type:'grid',answer:2},{q:'SELECT ALL SQUARES\nWITH BUSES',type:'grid',answer:1},{q:'TAP AND HOLD\nTO CONFIRM',type:'hold'},{q:'SELECT ALL SQUARES\nWITH STOREFRONTS',type:'grid',answer:2},{q:'SELECT ALL SQUARES\nWITH MOTORCYCLES',type:'grid',answer:1},{q:'MOVE SLIDER TO\nCOMPLETE PUZZLE',type:'slide'},{q:'SELECT ALL SQUARES\nWITH PALM TREES',type:'grid',answer:1},{q:'SELECT ALL SQUARES\nWITH MOUNTAINS',type:'grid',answer:2},{q:'FINAL CHECK:\nPRESS CONFIRM',type:'click'}];const API='https://super-me-ranking.a8-jay808.workers.dev';let scene='title',selItem=0,timeLeft=0,maxTime=0,score=0,qIdx=0,qPool=[],curQ=null,answered=false,gridSel=[],slideX=0,sliding=false,nameInput='',namePos=0,board=[],boardLoaded=false,flashMsg='',flashTimer=0,blink=0,tick=0,held=0,sweatAnim=0;const AC=new(window.AudioContext||window.webkitAudioContext)();function beep(f,d,t='square',v=0.3){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}function sfxOk(){beep(523,0.06);setTimeout(()=>beep(659,0.06),80);setTimeout(()=>beep(784,0.1),160);}function sfxFail(){beep(220,0.15,'sawtooth');setTimeout(()=>beep(180,0.2,'sawtooth'),170);}function sfxTick(){beep(440,0.03,'square',0.1);}function sfxSoldOut(){[200,180,160,140].forEach((f,i)=>setTimeout(()=>beep(f,0.15,'sawtooth',0.4),i*120));}function sfxSelect(){beep(330,0.05);setTimeout(()=>beep(440,0.07),60);}function drawFaceSprite(x,y,w,mood){const s=w/4;ctx.fillStyle='#222';ctx.fillRect(x,y,w,w*1.1);ctx.fillStyle='#1a1a1a';ctx.fillRect(x+s*0.2,y+s*0.1,s*3.6,s*3.8);ctx.fillStyle='#111';ctx.fillRect(x+s*0.4,y,s*3.2,s*0.6);ctx.fillRect(x+s*0.3,y+s*0.4,s*3.4,s*3.2);ctx.fillRect(x+s*0.4,y+s*3.4,s*3.2,s*0.6);ctx.fillStyle='#2a2a2a';ctx.fillRect(x+s*0.8,y+s*1.2,s*2.4,s*1.6);if(mood===0){ctx.fillStyle='#ff6';ctx.fillRect(x+s*0.9,y+s*1.3,s*0.7,s*0.7);ctx.fillRect(x+s*2.4,y+s*1.3,s*0.7,s*0.7);ctx.fillStyle='#fff';ctx.fillRect(x+s*1.1,y+s*2.4,s*1.8,s*0.3);}else if(mood===1){ctx.fillStyle='#ff6';ctx.fillRect(x+s*0.9,y+s*1.4,s*0.7,s*0.5);ctx.fillRect(x+s*2.4,y+s*1.4,s*0.7,s*0.5);ctx.fillStyle='#fff';ctx.fillRect(x+s*1.2,y+s*2.3,s*1.6,s*0.25);ctx.fillStyle='#88f';ctx.fillRect(x+s*0.9,y+s*1.2,s*0.7,s*0.2);ctx.fillRect(x+s*2.4,y+s*1.2,s*0.7,s*0.2);}else{ctx.fillStyle='#f88';ctx.fillRect(x+s*0.9,y+s*1.5,s*0.6,s*0.4);ctx.fillRect(x+s*2.5,y+s*1.5,s*0.6,s*0.4);ctx.fillStyle='#88f';ctx.fillRect(x+s*1.2,y+s*2.4,s*1.6,s*0.2);ctx.fillStyle='#aaf';ctx.fillRect(x+s*0.7,y+s*2.1,s*0.3,s*0.5);ctx.fillRect(x+s*3.0,y+s*2.1,s*0.3,s*0.5);}if(mood>=1&&tick%20<10){ctx.fillStyle='#88f';ctx.fillRect(x+s*0.1,y+s*0.8,s*0.3,s*0.3);ctx.fillRect(x+s*3.6,y+s*1.0,s*0.3,s*0.3);}}function pct(){return timeLeft/maxTime;}function mood(){const p=pct();return p>0.6?0:p>0.3?1:2;}function nextQ(){curQ=QS[Math.floor(Math.random()*QS.length)];gridSel=[];slideX=0;sliding=false;held=0;answered=false;}function startGame(idx){selItem=idx;const it=ITEMS[idx];maxTime=it.time;timeLeft=it.time;score=0;qPool=[...QS];scene='game';nextQ();}function soldOut(){sfxSoldOut();scene='soldout';}function drawTitle(){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);ctx.fillStyle='#f00';ctx.fillRect(40,30,400,70);ctx.fillStyle='#fff';ctx.font='bold 28px monospace';ctx.textAlign='center';ctx.fillText('SUPER ME',W/2,68);ctx.fillText('CHALLENGE',W/2,95);ctx.fillStyle='#888';ctx.font='10px monospace';ctx.fillText('Super me',W/2,115);ctx.fillStyle='#ff0';ctx.font='12px monospace';ctx.fillText('SELECT ITEM TO PURCHASE:',W/2,145);const cols=['#0f0','#ff0','#f80'];ITEMS.forEach((it,i)=>{const y=165+i*58;const sel=selItem===i;ctx.fillStyle=sel?'#fff':'#333';ctx.fillRect(60,y,360,50);ctx.fillStyle=sel?'#000':'#aaa';ctx.font='bold 14px monospace';ctx.textAlign='left';ctx.fillText(it.name,80,y+18);ctx.fillStyle=cols[i];ctx.font='10px monospace';ctx.fillText(it.diff+' | TIME: '+it.time+'S',80,y+34);ctx.fillStyle=sel?'#000':'#888';ctx.font='10px monospace';ctx.fillText(it.price,340,y+18);if(sel){ctx.fillStyle='#f00';ctx.fillText('>',66,y+18);}});ctx.fillStyle='#555';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText('* ALL DIFFICULTIES SHARE THE SAME 15 QUESTIONS',W/2,355);ctx.fillText('ONLY TIMER LENGTH DIFFERS BY DIFFICULTY',W/2,368);ctx.fillStyle=blink%40<20?'#ff0':'#880';ctx.font='12px monospace';ctx.fillText('PRESS ENTER / CLICK TO START',W/2,400);ctx.fillStyle='#333';ctx.font='10px monospace';ctx.fillText('VER:1.0  (C) SUPER ME INC.',W/2,460);}function drawGame(){ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);const p=pct();const barW=Math.floor((W-100)*p);ctx.fillStyle='#333';ctx.fillRect(50,8,W-100,16);ctx.fillStyle=p>0.5?'#0f0':p>0.25?'#ff0':'#f00';ctx.fillRect(50,8,barW,16);ctx.fillStyle='#fff';ctx.font='9px monospace';ctx.textAlign='left';ctx.fillText('TIME',8,20);ctx.textAlign='right';ctx.fillText(Math.ceil(timeLeft)+'S',W-8,20);const m=mood();drawFaceSprite(W-76,4,40,m);ctx.fillStyle='#222';ctx.fillRect(20,30,W-40,H-40);ctx.fillStyle='#444';ctx.fillRect(20,30,W-40,2);ctx.fillRect(20,H-10,W-40,2);ctx.fillStyle='#888';ctx.font='10px monospace';ctx.textAlign='left';ctx.fillText('reCAPTCHA',30,46);ctx.fillStyle='#555';ctx.font='9px monospace';ctx.fillText('SUPER ME SECURITY',30,58);if(curQ){const q=curQ;ctx.fillStyle='#ccc';ctx.font='bold 11px monospace';ctx.textAlign='center';const lines=q.q.split('\n');lines.forEach((l,i)=>ctx.fillText(l,W/2,80+i*14));if(q.type==='grid'){const gx=60,gy=100,gs=80,gp=4;for(let i=0;i<9;i++){const rx=gx+(i%3)*(gs+gp),ry=gy+Math.floor(i/3)*(gs+gp);const sel=gridSel.includes(i);ctx.fillStyle=sel?'#446':'#333';ctx.fillRect(rx,ry,gs,gs);ctx.fillStyle=sel?'#88f':'#555';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText(i%3===0?'IMG':'...',rx+gs/2,ry+gs/2);}ctx.fillStyle='#0af';ctx.fillRect(gx,gy+3*(gs+gp)+8,3*(gs+gp)-4,28);ctx.fillStyle='#fff';ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.fillText('VERIFY',gx+(3*(gs+gp)-4)/2,gy+3*(gs+gp)+8+18);}else if(q.type==='check'){ctx.fillStyle=held>30?'#0f0':'#333';ctx.fillRect(120,140,240,60);ctx.fillStyle='#fff';ctx.font='12px monospace';ctx.textAlign='center';ctx.fillText('HOLD TO CONFIRM',W/2,175);ctx.fillStyle='#0af';ctx.fillRect(120,240,240,40);ctx.fillStyle='#fff';ctx.fillText('I AM NOT A ROBOT',W/2,265);}else if(q.type==='click'){ctx.fillStyle='#0af';ctx.fillRect(140,200,200,50);ctx.fillStyle='#fff';ctx.font='bold 14px monospace';ctx.textAlign='center';ctx.fillText('VERIFY',W/2,232);}else if(q.type==='hold'){ctx.fillStyle='#333';ctx.fillRect(100,180,280,50);ctx.fillStyle=held>0?'#0f0':'#555';ctx.fillRect(100,180,Math.min(held/60*280,280),50);ctx.fillStyle='#fff';ctx.font='11px monospace';ctx.textAlign='center';ctx.fillText('HOLD BUTTON...',W/2,210);ctx.fillStyle='#0af';ctx.fillRect(140,260,200,40);ctx.fillStyle='#fff';ctx.fillText('HOLD HERE',W/2,285);}else if(q.type==='slide'){ctx.fillStyle='#333';ctx.fillRect(60,200,360,30);ctx.fillStyle='#0af';ctx.fillRect(60+slideX,195,40,40);ctx.fillStyle='#fff';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText('SLIDE TO VERIFY >>',W/2,260);}}ctx.fillStyle='#444';ctx.font='9px monospace';ctx.textAlign='left';ctx.fillText('SCORE:'+score,8,H-2);ctx.textAlign='right';ctx.fillText(ITEMS[selItem].name,W-8,H-2);if(flashTimer>0){ctx.fillStyle=flashTimer%4<2?'#0f4':'#000';ctx.fillRect(0,0,W,H);ctx.fillStyle='#0f0';ctx.font='bold 16px monospace';ctx.textAlign='center';ctx.fillText('VERIFIED!',W/2,H/2);}}function drawSoldOut(){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);ctx.fillStyle='#f00';ctx.fillRect(60,80,360,120);ctx.fillStyle='#fff';ctx.font='bold 48px monospace';ctx.textAlign='center';ctx.fillText('SOLD',W/2,140);ctx.fillText('OUT',W/2,185);ctx.fillStyle='#888';ctx.font='12px monospace';ctx.fillText('YOU WERE TOO SLOW...',W/2,240);ctx.fillStyle='#ff0';ctx.font='14px monospace';ctx.fillText('SCORE: '+score,W/2,270);ctx.fillStyle='#0af';ctx.font='11px monospace';if(score>0){ctx.fillText('ENTER YOUR NAME FOR RANKING!',W/2,310);ctx.fillStyle=blink%40<20?'#ff0':'#880';ctx.fillText('PRESS ENTER TO CONTINUE',W/2,340);}else{ctx.fillStyle='#888';ctx.fillText('NO SCORE - BACK TO TITLE',W/2,310);ctx.fillStyle=blink%40<20?'#ff0':'#880';ctx.fillText('PRESS ENTER TO RETRY',W/2,340);}}function drawNameEntry(){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ff0';ctx.font='bold 16px monospace';ctx.textAlign='center';ctx.fillText('NEW RECORD!',W/2,60);ctx.fillText('SCORE: '+score,W/2,85);ctx.fillStyle='#888';ctx.font='11px monospace';ctx.fillText('DIFFICULTY: '+ITEMS[selItem].diff,W/2,105);ctx.fillStyle='#fff';ctx.font='14px monospace';ctx.fillText('ENTER YOUR NAME (3 CHARS):',W/2,145);ctx.fillStyle='#333';ctx.fillRect(160,165,160,40);ctx.fillStyle='#fff';ctx.font='bold 24px monospace';ctx.textAlign='center';let display=nameInput.padEnd(3,'_');ctx.fillText(display,W/2,192);if(blink%30<15){ctx.fillStyle='#ff0';ctx.fillRect(160+nameInput.length*40+20,168,3,34);}ctx.fillStyle='#888';ctx.font='10px monospace';ctx.fillText('USE KEYBOARD - ENTER TO SUBMIT',W/2,230);}function drawRanking(){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);ctx.fillStyle='#f00';ctx.fillRect(60,20,360,40);ctx.fillStyle='#fff';ctx.font='bold 18px monospace';ctx.textAlign='center';ctx.fillText('RANKING - '+ITEMS[selItem].diff,W/2,46);if(!boardLoaded){ctx.fillStyle='#888';ctx.font='12px monospace';ctx.fillText('LOADING...',W/2,200);}else{board.forEach((e,i)=>{const y=85+i*30;ctx.fillStyle=i===0?'#ff0':i===1?'#aaa':i===2?'#c80':'#666';ctx.font='bold 12px monospace';ctx.textAlign='left';ctx.fillText((i+1)+'. '+e.name,80,y);ctx.textAlign='right';ctx.fillText(e.score,W-80,y);});if(board.length===0){ctx.fillStyle='#555';ctx.font='11px monospace';ctx.textAlign='center';ctx.fillText('NO RECORDS YET',W/2,200);}}ctx.fillStyle=blink%40<20?'#ff0':'#880';ctx.font='11px monospace';ctx.textAlign='center';ctx.fillText('PRESS ENTER TO PLAY AGAIN',W/2,440);}async function submitScore(name,sc,diff){try{await fetch(API+'/ranking',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name.toUpperCase(),score:sc,difficulty:diff.toLowerCase()})});}catch(e){}}async function loadBoard(diff){boardLoaded=false;board=[];try{const r=await fetch(API+'/ranking?difficulty='+diff.toLowerCase());const j=await r.json();board=j.board||[];}catch(e){board=[];}boardLoaded=true;}let last=0;function loop(ts){tick++;blink++;const dt=(ts-last)/1000;last=ts;if(scene==='game'&&flashTimer<=0){timeLeft-=dt;if(timeLeft<=0){timeLeft=0;soldOut();}}if(flashTimer>0)flashTimer--;requestAnimationFrame(loop);if(scene==='title')drawTitle();else if(scene==='game')drawGame();else if(scene==='soldout')drawSoldOut();else if(scene==='nameentry')drawNameEntry();else if(scene==='ranking')drawRanking();}requestAnimationFrame(loop);document.addEventListener('keydown',e=>{AC.resume();if(scene==='title'){if(e.key==='ArrowUp'||e.key==='ArrowLeft'){selItem=(selItem+2)%3;sfxSelect();}else if(e.key==='ArrowDown'||e.key==='ArrowRight'){selItem=(selItem+1)%3;sfxSelect();}else if(e.key==='Enter'){startGame(selItem);sfxSelect();}}else if(scene==='soldout'){if(e.key==='Enter'){if(score>0){nameInput='';scene='nameentry';}else{scene='title';}}}else if(scene==='nameentry'){if(e.key==='Backspace'){nameInput=nameInput.slice(0,-1);}else if(e.key==='Enter'&&nameInput.length>0){const n=nameInput.padEnd(3,'A').slice(0,3);submitScore(n,score,ITEMS[selItem].diff);loadBoard(ITEMS[selItem].diff);scene='ranking';}else if(/^[A-Za-z0-9!@#$]$/.test(e.key)&&nameInput.length<3){nameInput+=e.key.toUpperCase();}}else if(scene==='ranking'){if(e.key==='Enter'){scene='title';}}else if(scene==='game'){if(e.key===' '||e.key==='Enter'){handleAction();}}});function handleAction(){if(!curQ||answered)return;const q=curQ;if(q.type==='click'||q.type==='check'){score++;sfxOk();flashTimer=18;answered=true;setTimeout(nextQ,300);}else if(q.type==='grid'){if(gridSel.length>0){score++;sfxOk();flashTimer=18;answered=true;setTimeout(nextQ,300);}else{sfxFail();}}else if(q.type==='hold'){if(held>=60){score++;sfxOk();flashTimer=18;answered=true;setTimeout(nextQ,300);}else{sfxFail();}}else if(q.type==='slide'){if(slideX>=280){score++;sfxOk();flashTimer=18;answered=true;setTimeout(nextQ,300);}else{sfxFail();}}}c.addEventListener('click',e=>{AC.resume();const r=c.getBoundingClientRect();const mx=(e.clientX-r.left)*(W/r.width);const my=(e.clientY-r.top)*(H/r.height);if(scene==='title'){ITEMS.forEach((it,i)=>{const y=165+i*58;if(mx>=60&&mx<=420&&my>=y&&my<=y+50){if(selItem===i){startGame(i);sfxSelect();}else{selItem=i;sfxSelect();}}});}else if(scene==='game'&&curQ){const q=curQ;if(q.type==='grid'){const gx=60,gy=100,gs=80,gp=4;for(let i=0;i<9;i++){const rx=gx+(i%3)*(gs+gp),ry=gy+Math.floor(i/3)*(gs+gp);if(mx>=rx&&mx<=rx+gs&&my>=ry&&my<=ry+gs){const idx=gridSel.indexOf(i);if(idx>=0)gridSel.splice(idx,1);else gridSel.push(i);sfxTick();}}const vx=gx,vy=gy+3*(gs+gp)+8,vw=3*(gs+gp)-4;if(mx>=vx&&mx<=vx+vw&&my>=vy&&my<=vy+28)handleAction();}else if(q.type==='click'){if(mx>=140&&mx<=340&&my>=200&&my<=250)handleAction();}else if(q.type==='check'){if(mx>=120&&mx<=360&&my>=240&&my<=280)handleAction();}else if(q.type==='hold'){if(mx>=140&&mx<=340&&my>=260&&my<=300){held+=20;if(held>=60)handleAction();}}else if(q.type==='slide'){if(mx>=60&&mx<=420&&my>=195&&my<=235){slideX=Math.min(320,Math.max(0,mx-60-20));if(slideX>=280)handleAction();}}}else if(scene==='soldout'){if(score>0){nameInput='';scene='nameentry';}else{scene='title';}}else if(scene==='ranking'){scene='title';}});</script></body></html>
