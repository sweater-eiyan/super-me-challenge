<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SUPER ME CHALLENGE</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}canvas{display:block;image-rendering:pixelated}</style></head><body><canvas id="c"></canvas><script>const c=document.getElementById('c'),ctx=c.getContext('2d');const W=540,H=600;c.width=W;c.height=H;const API='https://super-me-ranking.sweater-eiyan.workers.dev';const ITEMS=[{name:'Logo Don Tee',diff:'EASY',time:45,color:'#e8e8e8'},{name:'BOXLOGO Hoodie',diff:'NORMAL',time:30,color:'#c8a020'},{name:'Limited Collab',diff:'HARD',time:20,color:'#ff4444'}];const QS=[{q:'Select all images containing FIRE HYDRANT',opts:['🚒','🧯','🚑','🐕','🏠','🚰','🔥','🛻','🧲'],ans:[5]},{q:'Select all images containing TRAFFIC LIGHT',opts:['🚦','🛑','🚗','🚦','⚠️','🔴','🚥','🏎️','🛤️'],ans:[0,3,6]},{q:'Select all images containing A DOG',opts:['🐕','🌭','🐈','🦊','🐩','🐾','🐶','🍖','🦮'],ans:[0,4,6,8]},{q:'Select all images containing CROSSWALK',opts:['🛤️','🚶','⬜','🚸','🏃','🦓','🚷','🗺️','🛣️'],ans:[2,3,5]},{q:'Select all images containing A BUS',opts:['🚌','🚐','✈️','🚎','🚂','🚃','🏨','🚑','🚕'],ans:[0,1,3]},{q:'Select all images containing BICYCLE',opts:['🚲','🛵','🚴','🛴','🏍️','🚵','🚁','🛺','🤸'],ans:[0,2,5]},{q:'Select all images containing FOOD',opts:['🍕','🔧','🍔','📱','🍜','🪑','🌮','📦','🍣'],ans:[0,2,4,6,8]},{q:'Select all images containing A CAT',opts:['🐱','🦁','🐯','😸','🐅','🙀','🐻','😻','🐼'],ans:[0,3,5,7]},{q:'Select all images containing MOUNTAIN',opts:['⛰️','🏔️','🌋','🗻','🏕️','🌄','🏞️','🗼','🌅'],ans:[0,1,2,3]},{q:'Select all images containing A BOAT',opts:['⛵','🚢','🛥️','🛶','✈️','🚁','🛸','🚤','🏊'],ans:[0,1,2,3,7]},{q:'Select all images containing UMBRELLA',opts:['☂️','🌂','☔','🎪','🏖️','🌧️','⛱️','🎠','🧢'],ans:[0,1,2,6]},{q:'Select all images containing A TREE',opts:['🌲','🌴','🌵','🌾','🏡','🌳','🌿','🍄','🌱'],ans:[0,1,2,5]},{q:'Select all images containing CLOCK',opts:['⏰','🕐','⌚','📅','⏱️','🗓️','🕰️','⌛','📆'],ans:[0,1,2,4,6,7]},{q:'Select all images containing A STAR',opts:['⭐','🌟','💫','✨','🌙','☀️','🌠','🎇','🎆'],ans:[0,1,2,3,6]},{q:'Select all images containing VEHICLE',opts:['🚗','🛺','🚀','🛵','🏎️','🛻','🛸','🚐','🚲'],ans:[0,1,3,4,5,7,8]}];let scene='title',selItem=0,maxTime=45,timeLeft=0,score=0,qIdx=0,selected=[],ranking=[],initials='AAA',initPos=0,rankData=[];let curQ=null,sweat=0,lastT=0,animT=0;const AC=new(window.AudioContext||window.webkitAudioContext)();function beep(f,d,t='square',v=0.3){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}function sfxOk(){beep(523,0.1);setTimeout(()=>beep(659,0.1),100);setTimeout(()=>beep(784,0.15),200);}function sfxFail(){beep(200,0.2,'sawtooth');setTimeout(()=>beep(150,0.3,'sawtooth'),200);}function sfxSoldOut(){beep(400,0.1,'sawtooth');setTimeout(()=>beep(300,0.1,'sawtooth'),120);setTimeout(()=>beep(200,0.3,'sawtooth'),240);}function sfxRank(){beep(784,0.1);setTimeout(()=>beep(880,0.1),100);setTimeout(()=>beep(988,0.1),200);setTimeout(()=>beep(1047,0.3),300);}let bgmInt=null;function startBGM(){if(bgmInt)return;let n=0;const notes=[262,294,330,349,392,440,392,349];bgmInt=setInterval(()=>{beep(notes[n%notes.length],0.12,'square',0.1);n++;},200);}function stopBGM(){clearInterval(bgmInt);bgmInt=null;}function drawBalaclava(x,y,s,emotion){ctx.save();ctx.translate(x,y);const sc=s||1;ctx.scale(sc,sc);ctx.fillStyle='#f0c090';ctx.fillRect(-8,12,16,20);ctx.fillStyle='#d4a060';ctx.fillRect(-6,28,3,18);ctx.fillRect(3,28,3,18);ctx.fillStyle='#222';ctx.fillRect(-12,-20,24,36);ctx.fillRect(-10,-22,20,4);ctx.fillStyle='#1a1a1a';ctx.fillRect(-14,-4,6,12);ctx.fillRect(8,-4,6,12);ctx.fillStyle='#f0c090';ctx.fillRect(-7,2,14,12);if(emotion===0){ctx.fillStyle='#fff';ctx.fillRect(-5,5,4,5);ctx.fillRect(1,5,4,5);ctx.fillStyle='#3a6fd8';ctx.fillRect(-4,6,3,3);ctx.fillRect(2,6,3,3);ctx.fillStyle='#000';ctx.fillRect(-3,7,2,2);ctx.fillRect(3,7,2,2);ctx.strokeStyle='#c06030';ctx.lineWidth=1;ctx.beginPath();ctx.arc(0,11,3,0.2,Math.PI-0.2);ctx.stroke();}else if(emotion===1){ctx.fillStyle='#fff';ctx.fillRect(-5,5,4,5);ctx.fillRect(1,5,4,5);ctx.fillStyle='#3a6fd8';ctx.fillRect(-4,7,3,3);ctx.fillRect(2,7,3,3);ctx.fillStyle='#000';ctx.fillRect(-3,8,2,2);ctx.fillRect(3,8,2,2);ctx.fillStyle='#aaddff';ctx.fillRect(-5,10,2,3);ctx.fillRect(4,10,2,3);ctx.strokeStyle='#c06030';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-3,13);ctx.lineTo(3,13);ctx.stroke();}else{ctx.fillStyle='#fff';ctx.fillRect(-5,6,4,5);ctx.fillRect(1,6,4,5);ctx.fillStyle='#3a6fd8';ctx.fillRect(-4,8,3,3);ctx.fillRect(2,8,3,3);ctx.fillStyle='#000';ctx.fillRect(-3,9,2,2);ctx.fillRect(3,9,2,2);ctx.fillStyle='#aaddff';ctx.fillRect(-5,11,2,4);ctx.fillRect(-3,13,2,4);ctx.fillRect(4,11,2,4);ctx.fillRect(3,13,2,4);ctx.strokeStyle='#c06030';ctx.lineWidth=1;ctx.beginPath();ctx.arc(0,14,3,Math.PI+0.3,-0.3);ctx.stroke();}ctx.restore();}function drawTee(x,y,color){ctx.save();ctx.translate(x,y);ctx.fillStyle=color||'#e8e8e8';ctx.fillRect(-20,-15,40,35);ctx.fillRect(-32,-15,12,15);ctx.fillRect(20,-15,12,15);ctx.fillStyle='#333';ctx.font='bold 8px monospace';ctx.textAlign='center';ctx.fillText('Super me',0,5);ctx.restore();}function drawHoodie(x,y,color){ctx.save();ctx.translate(x,y);ctx.fillStyle=color||'#c8a020';ctx.fillRect(-22,-15,44,38);ctx.fillRect(-34,-15,12,18);ctx.fillRect(22,-15,12,18);ctx.fillRect(-8,-28,16,18);ctx.fillStyle='#888';ctx.fillRect(-4,-14,8,20);ctx.fillStyle='#333';ctx.font='bold 8px monospace';ctx.textAlign='center';ctx.fillText('BOXLOGO',0,5);ctx.restore();}function drawCollab(x,y,color){ctx.save();ctx.translate(x,y);ctx.fillStyle=color||'#ff4444';ctx.fillRect(-22,-18,44,40);ctx.fillRect(-34,-18,12,18);ctx.fillRect(22,-18,12,18);ctx.fillRect(-8,-30,16,16);ctx.fillStyle='gold';for(let i=-15;i<=15;i+=8){ctx.fillRect(i,-8,5,5);}ctx.fillStyle='#fff';ctx.font='bold 7px monospace';ctx.textAlign='center';ctx.fillText('COLLAB',0,8);ctx.restore();}function drawTitle(){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ff0000';ctx.font='bold 36px monospace';ctx.textAlign='center';ctx.fillText('SUPER ME',W/2,70);ctx.fillStyle='#fff';ctx.font='bold 18px monospace';ctx.fillText('CHALLENGE',W/2,100);ctx.fillStyle='#888';ctx.font='10px monospace';ctx.fillText('- SELECT YOUR ITEM -',W/2,135);const xs=[90,270,450];const drawFns=[drawTee,drawHoodie,drawCollab];const colors=['#e8e8e8','#c8a020','#ff4444'];const diffs=['EASY','NORMAL','HARD'];const times=['45sec','30sec','20sec'];const names=['Logo Don Tee','BOXLOGO Hoodie','Limited Collab'];for(let i=0;i<3;i++){const x=xs[i];const sel=(selItem===i);ctx.fillStyle=sel?'#ff0000':'#222';ctx.fillRect(x-55,148,110,120);ctx.strokeStyle=sel?'#ff4444':'#444';ctx.lineWidth=2;ctx.strokeRect(x-55,148,110,120);drawFns[i](x,195,colors[i]);ctx.fillStyle=sel?'#fff':'#888';ctx.font='bold 8px monospace';ctx.textAlign='center';ctx.fillText(names[i],x,240);ctx.fillStyle=sel?'#ffff00':'#666';ctx.font='8px monospace';ctx.fillText(diffs[i]+' / '+times[i],x,255);}ctx.fillStyle='#555';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText('CLICK ITEM OR PRESS ENTER TO START',W/2,295);ctx.fillStyle='#333';ctx.font='8px monospace';ctx.fillText('VER:3.0  (C) SUPER ME INC.',W/2,516);}function drawGame(){ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);const ratio=timeLeft/maxTime;const emotion=ratio>0.6?0:ratio>0.3?1:2;ctx.fillStyle='#111';ctx.fillRect(0,0,W,38);const bw=W-120;ctx.fillStyle='#333';ctx.fillRect(10,8,bw,18);ctx.fillStyle=ratio>0.5?'#00cc44':ratio>0.25?'#ffaa00':'#ff2222';ctx.fillRect(10,8,bw*ratio,18);ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.strokeRect(10,8,bw,18);ctx.fillStyle='#fff';ctx.font='bold 9px monospace';ctx.textAlign='left';ctx.fillText('TIME',12,22);ctx.fillStyle='#fff';ctx.font='bold 10px monospace';ctx.textAlign='right';ctx.fillText(Math.ceil(timeLeft)+'s',W-115,23);drawBalaclava(W-55,20,1.1,emotion);if(sweat>0&&emotion>0){ctx.fillStyle='rgba(100,180,255,0.8)';ctx.font='12px monospace';ctx.textAlign='left';ctx.fillText(';;',W-40,12);sweat=Math.max(0,sweat-1);}ctx.fillStyle='#fff';ctx.font='bold 10px monospace';ctx.textAlign='right';ctx.fillText('SCORE:'+score,W-10,56);ctx.fillStyle='#888';ctx.font='8px monospace';ctx.fillText(ITEMS[selItem].name,W-10,68);if(!curQ)return;const qx=15,qy=75,qw=W-30,qh=370;ctx.fillStyle='#f0f0f0';ctx.fillRect(qx,qy,qw,qh);ctx.strokeStyle='#ccc';ctx.lineWidth=1;ctx.strokeRect(qx,qy,qw,qh);ctx.fillStyle='#333';ctx.font='bold 11px monospace';ctx.textAlign='left';ctx.fillText(curQ.q,qx+8,qy+20);ctx.fillStyle='#555';ctx.font='9px monospace';ctx.fillText('Click all that apply. Click VERIFY when done.',qx+8,qy+35);const cols=3,rows=3,cellW=Math.floor((qw-16)/cols),cellH=58;for(let i=0;i<9;i++){const col=i%cols,row=Math.floor(i/cols);const cx=qx+8+col*cellW,cy=qy+45+row*cellH;const isSel=selected.includes(i);ctx.fillStyle=isSel?'#d0e8ff':'#fff';ctx.fillRect(cx,cy,cellW-4,cellH-4);ctx.strokeStyle=isSel?'#2266cc':'#bbb';ctx.lineWidth=isSel?2:1;ctx.strokeRect(cx,cy,cellW-4,cellH-4);ctx.font='26px monospace';ctx.textAlign='center';ctx.fillText(curQ.opts[i],cx+(cellW-4)/2,cy+32);if(isSel){ctx.fillStyle='rgba(34,102,204,0.15)';ctx.fillRect(cx,cy,cellW-4,cellH-4);}}const btnY=qy+45+rows*cellH+6;ctx.fillStyle='#4285f4';ctx.fillRect(qx+8,btnY,qw-16,32);ctx.fillStyle='#fff';ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.fillText('VERIFY',W/2,btnY+21);}function drawSoldOut(){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ff0000';ctx.font='bold 60px monospace';ctx.textAlign='center';ctx.fillText('SOLD',W/2,200);ctx.fillText('OUT',W/2,270);ctx.fillStyle='#888';ctx.font='14px monospace';ctx.fillText('ITEM: '+ITEMS[selItem].name,W/2,320);ctx.fillStyle='#ffff00';ctx.font='bold 16px monospace';ctx.fillText('YOUR SCORE: '+score,W/2,360);ctx.fillStyle='#555';ctx.font='10px monospace';ctx.fillText('PRESS ENTER OR CLICK TO CONTINUE',W/2,420);}function drawNameEntry(){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffff00';ctx.font='bold 20px monospace';ctx.textAlign='center';ctx.fillText('YOU RANKED!',W/2,120);ctx.fillStyle='#fff';ctx.font='14px monospace';ctx.fillText('ENTER YOUR NAME (3 CHARS)',W/2,160);ctx.font='bold 40px monospace';let disp='';for(let i=0;i<3;i++){disp+=(i===initPos?'['+initials[i]+']':' '+initials[i]+' ');}ctx.fillStyle='#00ff88';ctx.fillText(disp,W/2,240);ctx.fillStyle='#555';ctx.font='10px monospace';ctx.fillText('LEFT/RIGHT: MOVE  UP/DOWN: CHANGE CHAR',W/2,300);ctx.fillText('ENTER: CONFIRM',W/2,320);}function drawRanking(){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ff0000';ctx.font='bold 22px monospace';ctx.textAlign='center';ctx.fillText('RANKING',W/2,45);ctx.fillStyle='#ffff00';ctx.font='bold 11px monospace';ctx.fillText('-- '+ITEMS[selItem].diff+' --',W/2,65);const board=rankData;for(let i=0;i<Math.min(10,board.length);i++){const r=board[i];ctx.fillStyle=i<3?'#ffdd44':'#aaa';ctx.font='bold 13px monospace';ctx.textAlign='left';ctx.fillText((i+1)+'.',55,100+i*38);ctx.fillStyle=i<3?'#fff':'#888';ctx.fillText(r.name,90,100+i*38);ctx.fillStyle=i<3?'#ffdd44':'#aaa';ctx.textAlign='right';ctx.fillText(r.score+'pts',W-55,100+i*38);}if(board.length===0){ctx.fillStyle='#555';ctx.font='12px monospace';ctx.textAlign='center';ctx.fillText('NO RECORDS YET',W/2,200);}ctx.fillStyle='#444';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText('PRESS ENTER OR CLICK TO RETURN',W/2,490);}function nextQ(){const pool=[...QS];qIdx=Math.floor(Math.random()*pool.length);curQ=pool[qIdx];selected=[];}function startGame(idx){selItem=idx;maxTime=ITEMS[idx].time;timeLeft=maxTime;score=0;scene='game';nextQ();startBGM();}function soldOut(){stopBGM();sfxSoldOut();scene='soldout';}function checkRank(cb){fetch(API+'/ranking?difficulty='+ITEMS[selItem].diff).then(r=>r.json()).then(d=>{rankData=d.board||[];const tenthScore=rankData.length<10?0:(rankData[9]||{score:0}).score;cb(score>tenthScore||(rankData.length<10&&score>0));}).catch(()=>{rankData=[];cb(score>0);});}function submitScore(name){fetch(API+'/ranking',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,score:score,difficulty:ITEMS[selItem].diff})}).then(r=>r.json()).then(()=>{fetch(API+'/ranking?difficulty='+ITEMS[selItem].diff).then(r=>r.json()).then(d=>{rankData=d.board||[];scene='ranking';});}).catch(()=>{scene='ranking';});}function verifyAnswer(){const correct=curQ.ans.slice().sort().join(',')===selected.slice().sort().join(',');if(correct){score++;sfxOk();sweat=30;nextQ();}else{sfxFail();selected=[];}}const CHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';function charUp(i){const idx=CHARS.indexOf(initials[i]);const ni=(idx+1)%CHARS.length;initials=initials.substring(0,i)+CHARS[ni]+initials.substring(i+1);}function charDn(i){const idx=CHARS.indexOf(initials[i]);const ni=(idx-1+CHARS.length)%CHARS.length;initials=initials.substring(0,i)+CHARS[ni]+initials.substring(i+1);}document.addEventListener('keydown',e=>{AC.resume();if(scene==='title'){if(e.key==='ArrowLeft'){selItem=(selItem+2)%3;beep(440,0.05);}else if(e.key==='ArrowRight'){selItem=(selItem+1)%3;beep(440,0.05);}else if(e.key==='Enter'){startGame(selItem);}}else if(scene==='game'){if(e.key==='Enter'){verifyAnswer();}}else if(scene==='soldout'){if(e.key==='Enter'){checkRank(r=>{if(r){initials='AAA';initPos=0;scene='nameentry';}else{fetch(API+'/ranking?difficulty='+ITEMS[selItem].diff).then(r=>r.json()).then(d=>{rankData=d.board||[];scene='ranking';}).catch(()=>{rankData=[];scene='ranking';});}});}}else if(scene==='nameentry'){if(e.key==='ArrowLeft'){initPos=(initPos+2)%3;beep(440,0.05);}else if(e.key==='ArrowRight'){initPos=(initPos+1)%3;beep(440,0.05);}else if(e.key==='ArrowUp'){charUp(initPos);beep(440,0.05);}else if(e.key==='ArrowDown'){charDn(initPos);beep(440,0.05);}else if(e.key==='Enter'){submitScore(initials);sfxRank();}}else if(scene==='ranking'){if(e.key==='Enter'){scene='title';}}});c.addEventListener('click',e=>{AC.resume();const r=c.getBoundingClientRect();const mx=(e.clientX-r.left)*(W/r.width);const my=(e.clientY-r.top)*(H/r.height);if(scene==='title'){const xs=[90,270,450];for(let i=0;i<3;i++){if(mx>=xs[i]-55&&mx<=xs[i]+55&&my>=148&&my<=268){if(selItem===i){startGame(i);}else{selItem=i;beep(440,0.05);}return;}}if(my>=280&&my<=295){startGame(selItem);}}else if(scene==='game'&&curQ){const qx=15,qy=75,qw=W-30;const cols=3,cellW=Math.floor((qw-16)/cols),cellH=58;for(let i=0;i<9;i++){const col=i%cols,row=Math.floor(i/cols);const cx=qx+8+col*cellW,cy=qy+45+row*cellH;if(mx>=cx&&mx<=cx+cellW-4&&my>=cy&&my<=cy+cellH-4){const idx=selected.indexOf(i);if(idx>=0){selected.splice(idx,1);}else{selected.push(i);}beep(440,0.05);return;}}const btnY=qy+45+3*cellH+6;if(mx>=qx+8&&mx<=qx+qw-8&&my>=btnY&&my<=btnY+32){verifyAnswer();}}else if(scene==='soldout'){checkRank(r=>{if(r){initials='AAA';initPos=0;scene='nameentry';}else{fetch(API+'/ranking?difficulty='+ITEMS[selItem].diff).then(r=>r.json()).then(d=>{rankData=d.board||[];scene='ranking';}).catch(()=>{rankData=[];scene='ranking';});}});}else if(scene==='ranking'){scene='title';}});let lastTime=0;function loop(ts){const dt=Math.min((ts-lastTime)/1000,0.1);lastTime=ts;if(scene==='game'){timeLeft-=dt;if(timeLeft<=0){timeLeft=0;soldOut();}}if(scene==='title')drawTitle();else if(scene==='game')drawGame();else if(scene==='soldout')drawSoldOut();else if(scene==='nameentry')drawNameEntry();else if(scene==='ranking')drawRanking();requestAnimationFrame(loop);}requestAnimationFrame(loop);</script></body></html>
