<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SUPER ME CHALLENGE</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:monospace}canvas{display:block;image-rendering:pixelated}</style></head><body><canvas id="c"></canvas><script>const WORKER='https://super-me-ranking.a8-jay808.workers.dev';const W=512,H=480;const c=document.getElementById('c');const ctx=c.getContext('2d');c.width=W;c.height=H;c.style.width=W+'px';c.style.height=H+'px';const DIFF={easy:{label:'LOGO DON TEE',time:45,color:'#44ff44'},normal:{label:'BOXLOGO HOODIE',time:30,color:'#ffff44'},hard:{label:'LIMITED COLLAB',time:20,color:'#ff4444'}};const FACES=['( -_-)',"( o_o)",'( >_<)','( T_T)'];const QUESTIONS=[{q:'SELECT ALL SQUARES WITH\nBOX LOGOS',type:'grid',answer:2},{q:'I AM NOT A RESELLER',type:'check'},{q:'PROVE YOU DESERVE\nCHECKOUT',type:'type',answer:'CHECKOUT'},{q:'WHAT IS 2 + 3 CARTS?',type:'math',answer:5},{q:'SELECT THE ITEM WITH\nWORST RESALE ETHICS',type:'choice',choices:['BRICK','CHAIR','HOODIE'],answer:2},{q:'VERIFY YOUR HUMAN HYPE\nCLICK THE HYPE BUTTON',type:'click'},{q:'RETYPE THIS PHRASE:\nNO BACKDOORS',type:'type',answer:'NO BACKDOORS'},{q:'SUSPICIOUS CUSTOMER\nDETECTED. CONFIRM HUMANITY',type:'check'},{q:'SELECT ALL SQUARES\nWITH FALSE HOPE',type:'grid',answer:3},{q:'CHOOSE THE CUSTOMER\nMOST LIKELY TO PANIC BUY',type:'choice',choices:['NORMIE','BOT','HYPEBEAST'],answer:2},{q:'ONE MORE STEP BEFORE\nPURCHASE. ENTER CODE:',type:'type',answer:'HYPE'},{q:'WHAT IS 1 + 1 DROPS?',type:'math',answer:2},{q:'CLICK TO CONFIRM YOU\nHAVE READ NOTHING',type:'click'},{q:'SELECT ALL SQUARES\nWITH CHECKOUT BUTTONS',type:'grid',answer:1},{q:'FINAL VERIFICATION:\nARE YOU HUMAN?',type:'check'}];let state='title',diff='easy',score=0,timeLeft=0,maxTime=0,qIdx=0,qList=[],userInput='',gridSel=-1,choiceSel=-1,checked=false,clickDone=false,mathInput='',flash=0,initials='',initPos=0,board={easy:[],normal:[],hard:[]},showBoard=false,boardDiff='easy',submitDone=false,rank=-1;const AC=new AudioContext();function beep(f,d,t='square',v=0.3){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.01,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}function playOk(){beep(523,0.1);setTimeout(()=>beep(659,0.1),100);}function playErr(){beep(200,0.3,'sawtooth');}function playSOLD(){beep(300,0.1,'sawtooth');setTimeout(()=>beep(200,0.15,'sawtooth'),100);setTimeout(()=>beep(100,0.3,'sawtooth'),250);}function playTitle(){beep(262,0.15);setTimeout(()=>beep(330,0.15),200);setTimeout(()=>beep(392,0.15),400);setTimeout(()=>beep(523,0.3),600);}function px(s,x,y,col,sc=1){ctx.fillStyle=col;const map={'0':'111101101101111','1':'010110010010111','2':'111001111100111','3':'111001111001111','4':'101101111001001','5':'111100111001111','6':'111100111101111','7':'111001001001001','8':'111101111101111','9':'111101111001111','A':'111101111101101','B':'110101110101110','C':'111100100100111','D':'110101101101110','E':'111100111100111','F':'111100111100100','G':'111100101101111','H':'101101111101101','I':'111010010010111','J':'001001001101111','K':'101101110101101','L':'100100100100111','M':'101111101101101','N':'101111101101101','O':'111101101101111','P':'111101111100100','Q':'111101101111001','R':'111101111101101','S':'111100111001111','T':'111010010010010','U':'101101101101111','V':'101101101101010','W':'101101101111101','X':'101101010101101','Y':'101101111010010','Z':'111001010100111',' ':'000000000000000','!':'010010010000010','.':'000000000000010',':':'000010000010000','-':'000000111000000','?':'111001010000010','(':'010100100100010',')':'010001001001010','_':'000000000000111','>':'100010001010100','<':'001010100010001','+':[...'000010111010000'],'=':'000111000111000'};for(let ch of s.toUpperCase()){const m=map[ch]||map[' '];for(let i=0;i<15;i++){if(m[i]==='1')ctx.fillRect(x+(i%3)*sc,y+Math.floor(i/3)*sc,sc,sc);}x+=4*sc;}}function drawFace(fi,x,y){const f=FACES[fi];ctx.fillStyle='#fff';ctx.font='bold 18px monospace';ctx.fillText(f,x,y);}function drawHUD(){const d=DIFF[diff];const pct=timeLeft/maxTime;ctx.fillStyle='#222';ctx.fillRect(0,0,W,40);ctx.fillStyle='#444';ctx.fillRect(8,8,W-80,24);const bw=Math.floor((W-80)*pct);ctx.fillStyle=pct>0.5?'#44ff44':pct>0.25?'#ffff44':'#ff4444';ctx.fillRect(8,8,bw,24);ctx.fillStyle='#000';ctx.font='bold 12px monospace';ctx.fillText('TIME',12,24);const fi=pct>0.69?0:pct>0.39?1:pct>0.14?2:3;drawFace(fi,W-68,28);px('SCORE:'+score,8,44,'#fff',1);}function drawTitle(){ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ff2222';ctx.fillRect(60,30,392,60);px('SUPER ME',80,45,'#fff',4);ctx.fillStyle='#fff';ctx.font='bold 14px monospace';ctx.fillText('CHALLENGE',180,100);px('PRESS ENTER TO START',40,120,'#ffff44',2);px('RANKINGS',170,150,'#44ffff',2);ctx.fillStyle='#888';ctx.font='12px monospace';ctx.fillText('SELECT ITEM TO BUY:',40,185);const items=[['LOGO DON TEE','easy','#44ff44'],['BOXLOGO HOODIE','normal','#ffff44'],['LIMITED COLLAB','hard','#ff4444']];items.forEach(([label,key,col],i)=>{const y=200+i*50;ctx.fillStyle=diff===key?col:'#333';ctx.fillRect(40,y,W-80,40);ctx.fillStyle=diff===key?'#000':'#888';ctx.font='bold 14px monospace';ctx.fillText(label,56,y+15);ctx.fillStyle=diff===key?'#000':'#666';ctx.font='12px monospace';const stats={easy:'PANIC: LOW  TIME: 45s',normal:'PANIC: MID  TIME: 30s',hard:'PANIC: MAX  TIME: 20s'};ctx.fillText(stats[key],56,y+30);if(diff===key){ctx.fillStyle='#fff';ctx.fillText('>',44,y+22);}});}function drawGame(){ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);drawHUD();if(flash>0){ctx.fillStyle='rgba(255,0,0,'+flash/10+')';ctx.fillRect(0,0,W,H);flash--;}const q=QUESTIONS[qList[qIdx]];const qd=DIFF[diff];ctx.fillStyle='#1a1a2e';ctx.fillRect(30,60,W-60,H-70);ctx.strokeStyle=qd.color;ctx.lineWidth=3;ctx.strokeRect(30,60,W-60,H-70);ctx.fillStyle='#fff';ctx.font='bold 12px monospace';const lines=q.q.split('\n');lines.forEach((l,i)=>ctx.fillText(l,46,88+i*16));ctx.fillStyle='#333';ctx.fillRect(40,110,W-80,2);drawQuestion(q);}function drawQuestion(q){const cy=130;if(q.type==='grid'){const cols=3,rows=3,sz=60,gap=8,ox=W/2-(cols*(sz+gap))/2;for(let i=0;i<9;i++){const gx=ox+(i%cols)*(sz+gap),gy=cy+(Math.floor(i/cols))*(sz+gap);ctx.fillStyle=gridSel===i?'#ff4444':'#2a2a4a';ctx.fillRect(gx,gy,sz,sz);ctx.strokeStyle='#666';ctx.strokeRect(gx,gy,sz,sz);if(i===q.answer){ctx.fillStyle='rgba(255,255,0,0.08)';ctx.fillRect(gx,gy,sz,sz);}ctx.fillStyle='#555';ctx.font='10px monospace';ctx.fillText('SM',gx+22,gy+34);}ctx.fillStyle='#888';ctx.font='12px monospace';ctx.fillText('Click the correct square',55,cy+3*(sz+gap)+10);}else if(q.type==='check'){ctx.fillStyle=checked?'#44ff44':'#333';ctx.fillRect(W/2-120,cy+20,24,24);ctx.strokeStyle='#fff';ctx.strokeRect(W/2-120,cy+20,24,24);if(checked){ctx.fillStyle='#000';ctx.font='bold 18px monospace';ctx.fillText('X',W/2-117,cy+38);}ctx.fillStyle='#fff';ctx.font='14px monospace';ctx.fillText('I AM NOT A RESELLER',W/2-90,cy+38);ctx.fillStyle='#888';ctx.font='11px monospace';ctx.fillText('CHECK THE BOX TO CONTINUE',W/2-100,cy+70);}else if(q.type==='type'){ctx.fillStyle='#fff';ctx.font='12px monospace';ctx.fillText('TYPE: '+q.answer,46,cy+10);ctx.fillStyle='#1a1a3a';ctx.fillRect(46,cy+20,W-92,32);ctx.strokeStyle='#44ff44';ctx.strokeRect(46,cy+20,W-92,32);ctx.fillStyle='#44ff44';ctx.font='bold 16px monospace';ctx.fillText(userInput+'_',56,cy+42);}else if(q.type==='math'){ctx.fillStyle='#fff';ctx.font='bold 20px monospace';ctx.fillText(q.q.split('?')[0]+'?',100,cy+20);ctx.fillStyle='#1a1a3a';ctx.fillRect(46,cy+40,W-92,32);ctx.strokeStyle='#44ff44';ctx.strokeRect(46,cy+40,W-92,32);ctx.fillStyle='#44ff44';ctx.font='bold 16px monospace';ctx.fillText(mathInput+'_',56,cy+62);}else if(q.type==='choice'){q.choices.forEach((ch,i)=>{ctx.fillStyle=choiceSel===i?'#ff4444':'#2a2a4a';ctx.fillRect(46,cy+10+i*50,W-92,40);ctx.strokeStyle=choiceSel===i?'#ff4444':'#666';ctx.strokeRect(46,cy+10+i*50,W-92,40);ctx.fillStyle='#fff';ctx.font='bold 14px monospace';ctx.fillText(ch,60,cy+36+i*50);});}else if(q.type==='click'){ctx.fillStyle=clickDone?'#44ff44':'#ff2222';ctx.fillRect(W/2-80,cy+40,160,50);ctx.fillStyle='#fff';ctx.font='bold 16px monospace';ctx.fillText(clickDone?'CLICKED!':'CLICK HERE',W/2-60,cy+72);}ctx.fillStyle='#666';ctx.font='11px monospace';ctx.fillText('VERIFY YOUR HUMAN HYPE  ['+score+' VERIFIED]',46,H-20);}function drawSoldOut(){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ff2222';ctx.fillRect(40,100,W-80,120);px('SOLD',80,115,'#fff',6);px('OUT',110,165,'#fff',6);ctx.fillStyle='#fff';ctx.font='14px monospace';ctx.fillText('VERIFICATIONS CLEARED: '+score,80,260);ctx.fillStyle='#888';ctx.font='12px monospace';ctx.fillText('ANOTHER CUSTOMER COMPLETED CHECKOUT.',50,290);ctx.fillStyle='#ffff44';ctx.font='12px monospace';ctx.fillText('TOO SLOW.',190,320);}function drawRankIn(){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ffff44';ctx.font='bold 18px monospace';ctx.fillText('YOU RANKED IN!',120,60);ctx.fillStyle='#fff';ctx.font='14px monospace';ctx.fillText('SCORE: '+score,180,90);ctx.fillText('ENTER YOUR INITIALS:',110,130);const chars=initials.split('');for(let i=0;i<3;i++){ctx.fillStyle=initPos===i?'#ff4444':'#333';ctx.fillRect(120+i*80,150,70,60);ctx.strokeStyle=initPos===i?'#ff4444':'#666';ctx.strokeRect(120+i*80,150,70,60);ctx.fillStyle='#fff';ctx.font='bold 32px monospace';ctx.fillText(chars[i]||'_',145+i*80,195);}ctx.fillStyle='#888';ctx.font='11px monospace';ctx.fillText('TYPE LETTERS OR NUMBERS. ENTER TO CONFIRM.',40,240);}function drawBoard(){ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ff2222';ctx.fillRect(40,10,W-80,40);px('RANKINGS',100,18,'#fff',3);const tabs=[['easy','#44ff44'],['normal','#ffff44'],['hard','#ff4444']];tabs.forEach(([k,col],i)=>{ctx.fillStyle=boardDiff===k?col:'#333';ctx.fillRect(40+i*144,55,140,30);ctx.fillStyle=boardDiff===k?'#000':'#888';ctx.font='bold 12px monospace';ctx.fillText(DIFF[k].label,50+i*144,75);});const bd=board[boardDiff];if(bd.length===0){ctx.fillStyle='#888';ctx.font='14px monospace';ctx.fillText('NO RECORDS YET',150,180);}else{bd.forEach((e,i)=>{ctx.fillStyle=i%2===0?'#1a1a1a':'#222';ctx.fillRect(40,95+i*34,W-80,32);ctx.fillStyle='#ffff44';ctx.font='bold 14px monospace';ctx.fillText((i+1)+'.',50,116+i*34);ctx.fillStyle='#fff';ctx.fillText(e.name,90,116+i*34);ctx.fillStyle='#44ff44';ctx.fillText(e.score+' VER',W-130,116+i*34);});}ctx.fillStyle='#666';ctx.font='12px monospace';ctx.fillText('ESC: BACK TO TITLE  TAB: CHANGE DIFF',50,H-15);}function nextQ(){userInput='';gridSel=-1;choiceSel=-1;checked=false;clickDone=false;mathInput='';qIdx=(qIdx+1)%qList.length;}function advanceQ(){score++;playOk();nextQ();}async function fetchBoard(d){try{const r=await fetch(WORKER+'/ranking?difficulty='+d);const j=await r.json();if(j.ok)board[d]=j.board;}catch(e){}}async function submitScore(){try{const r=await fetch(WORKER+'/ranking',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({difficulty:diff,name:initials,score})});const j=await r.json();if(j.ok){rank=j.rank;await fetchBoard(diff);}}catch(e){}}function startGame(){qList=[...Array(QUESTIONS.length).keys()].sort(()=>Math.random()-0.5);qIdx=0;score=0;maxTime=DIFF[diff].time;timeLeft=maxTime;state='game';userInput='';gridSel=-1;choiceSel=-1;checked=false;clickDone=false;mathInput='';flash=0;}let lastT=0;function loop(t){requestAnimationFrame(loop);const dt=(t-lastT)/1000;lastT=t;if(state==='game'){timeLeft=Math.max(0,timeLeft-dt);if(timeLeft<=0){playSOLD();state='soldout';return;}}if(state==='title')drawTitle();else if(state==='game')drawGame();else if(state==='soldout'){drawSoldOut();if(!submitDone){submitDone=true;const bd=board[diff];const wouldRank=bd.length<10||score>bd[bd.length-1].score;if(wouldRank){setTimeout(()=>{state='rankin';initials='';initPos=0;},2000);}else{setTimeout(()=>{state='title';},3000);}}}else if(state==='rankin')drawRankIn();else if(state==='board')drawBoard();}requestAnimationFrame(loop);document.addEventListener('keydown',e=>{AC.resume();if(state==='title'){if(e.key==='ArrowUp'||e.key==='ArrowDown'){const ks=Object.keys(DIFF);const ci=ks.indexOf(diff);diff=ks[(ci+(e.key==='ArrowDown'?1:-1)+3)%3];beep(440,0.05);}if(e.key==='Enter'){fetchBoard('easy');fetchBoard('normal');fetchBoard('hard');startGame();playTitle();}if(e.key==='r'||e.key==='R'){state='board';boardDiff=diff;fetchBoard('easy');fetchBoard('normal');fetchBoard('hard');}}else if(state==='board'){if(e.key==='Escape')state='title';if(e.key==='Tab'){e.preventDefault();const ks=Object.keys(DIFF);boardDiff=ks[(ks.indexOf(boardDiff)+1)%3];fetchBoard(boardDiff);}}else if(state==='game'){const q=QUESTIONS[qList[qIdx]];if(q.type==='type'){if(e.key.length===1&&userInput.length<20)userInput+=e.key.toUpperCase();if(e.key==='Backspace')userInput=userInput.slice(0,-1);if(e.key==='Enter'&&userInput===q.answer)advanceQ();else if(e.key==='Enter'){flash=8;playErr();}}else if(q.type==='math'){if(e.key>='0'&&e.key<='9'&&mathInput.length<3)mathInput+=e.key;if(e.key==='Backspace')mathInput=mathInput.slice(0,-1);if(e.key==='Enter'){if(parseInt(mathInput)===q.answer)advanceQ();else{flash=8;playErr();mathInput='';}}}else if(q.type==='check'){if(e.key===' '||e.key==='Enter'){if(!checked){checked=true;beep(440,0.05);}else advanceQ();}}else if(q.type==='click'){if(e.key==='Enter'&&clickDone)advanceQ();}else if(q.type==='choice'){if(e.key>='1'&&e.key<='3'){choiceSel=parseInt(e.key)-1;if(choiceSel===q.answer)advanceQ();else{flash=8;playErr();choiceSel=-1;}}}}else if(state==='rankin'){if(e.key.match(/^[A-Za-z0-9!]$/)&&initials.length<3){initials+=e.key.toUpperCase();initPos=initials.length;}if(e.key==='Backspace'){initials=initials.slice(0,-1);initPos=initials.length;}if(e.key==='Enter'&&initials.length>0){submitScore();state='board';boardDiff=diff;}}});c.addEventListener('click',e=>{AC.resume();const rect=c.getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;if(state==='title'){const items=['easy','normal','hard'];items.forEach((k,i)=>{const y=200+i*50;if(mx>=40&&mx<=W-40&&my>=y&&my<=y+40){diff=k;beep(440,0.05);}});if(mx>=40&&mx<=W-40&&my>=120&&my<=145){fetchBoard('easy');fetchBoard('normal');fetchBoard('hard');startGame();playTitle();}if(mx>=40&&mx<=W-40&&my>=150&&my<=175){state='board';boardDiff=diff;fetchBoard('easy');fetchBoard('normal');fetchBoard('hard');}}else if(state==='board'){const ks=Object.keys(DIFF);ks.forEach((k,i)=>{if(mx>=40+i*144&&mx<=180+i*144&&my>=55&&my<=85){boardDiff=k;fetchBoard(k);}});if(my>H-30)state='title';}else if(state==='game'){const q=QUESTIONS[qList[qIdx]];if(q.type==='grid'){const cols=3,sz=60,gap=8,ox=W/2-(cols*(sz+gap))/2,cy=130;for(let i=0;i<9;i++){const gx=ox+(i%cols)*(sz+gap),gy=cy+(Math.floor(i/3))*(sz+gap);if(mx>=gx&&mx<=gx+sz&&my>=gy&&my<=gy+sz){gridSel=i;if(i===q.answer)advanceQ();else{flash=8;playErr();gridSel=-1;}break;}}}else if(q.type==='check'){if(mx>=W/2-120&&mx<=W/2-96&&my>=150&&my<=174){if(!checked){checked=true;beep(440,0.05);}else advanceQ();}}else if(q.type==='click'){if(mx>=W/2-80&&mx<=W/2+80&&my>=170&&my<=220){if(!clickDone){clickDone=true;beep(523,0.1);}else advanceQ();}}else if(q.type==='choice'){q.choices.forEach((ch,i)=>{if(mx>=46&&mx<=W-46&&my>=260+i*50&&my<=300+i*50){choiceSel=i;if(i===q.answer)advanceQ();else{flash=8;playErr();choiceSel=-1;}}});}}}); fetchBoard('easy');fetchBoard('normal');fetchBoard('hard');</script></body></html>
