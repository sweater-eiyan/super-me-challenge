fillStyle='#ff6';ctx.fillRect(x+11*p,y+7*p,3*p,3*p);ctx.fillRect(x+18*p,y+7*p,3*p,3*p);ctx.fillStyle='#fff';ctx.fillRect(x+12*p,y+13*p,8*p,2*p);}else if(mood===1){ctx.fillStyle='#ff6';ctx.fillRect(x+11*p,y+8*p,3*p,2*p);ctx.fillRect(x+18*p,y+8*p,3*p,2*p);ctx.fillStyle='#fff';ctx.fillRect(x+12*p,y+12*p,8*p,1*p);ctx.fillStyle='#88f';ctx.fillRect(x+4*p,y+5*p,2*p,2*p);ctx.fillRect(x+26*p,y+6*p,2*p,2*p);}else{ctx.fillStyle='#f66';ctx.fillRect(x+11*p,y+9*p,3*p,2*p);ctx.fillRect(x+18*p,y+9*p,3*p,2*p);ctx.fillStyle='#fff';ctx.fillRect(x+12*p,y+14*p,8*p,1*p);ctx.fillStyle='#aaf';ctx.fillRect(x+10*p,y+12*p,2*p,3*p);ctx.fillRect(x+20*p,y+12*p,2*p,3*p);if(tick%20<10){ctx.fillStyle='#88f';ctx.fillRect(x+3*p,y+4*p,2*p,2*p);ctx.fillRect(x+27*p,y+5*p,2*p,2*p);}}ctx.fillStyle='#333';ctx.fillRect(x+4*p,y+18*p,24*p,20*p);ctx.fillStyle='#1a1a1a';ctx.fillRect(x+2*p,y+22*p,6*p,12*p);ctx.fillRect(x+24*p,y+22*p,6*p,12*p);ctx.fillStyle='#555';ctx.fillRect(x+2*p,y+22*p,4*p,4*p);ctx.fillRect(x+26*p,y+22*p,4*p,4*p);ctx.fillStyle='#444';ctx.fillRect(x+8*p,y+38*p,6*p,16*p);ctx.fillRect(x+18*p,y+38*p,6*p,16*p);ctx.fillStyle='#222';ctx.fillRect(x+6*p,y+52*p,8*p,4*p);ctx.fillRect(x+18*p,y+52*p,8*p,4*p);if(mood>=1&&tick%16<8){ctx.fillStyle='#88f';const sw=tick%8<4?2:3;ctx.fillRect(x+14*p,y+(6+sw)*p,4*p,2*p);}}function drawBalaclavaFace(x,y,sz,mood){const p=sz/12;ctx.fillStyle='#111';ctx.fillRect(x,y,sz,sz);ctx.fillStyle='#0d0d0d';ctx.fillRect(x+p,y+p,sz-2*p,sz-2*p);ctx.fillStyle='#222';ctx.fillRect(x+2*p,y+3*p,sz-4*p,sz-5*p);if(mood===0){ctx.fillStyle='#ff6';ctx.fillRect(x+2*p,y+4*p,2*p,2*p);ctx.fillRect(x+8*p,y+4*p,2*p,2*p);ctx.fillStyle='#ccc';ctx.fillRect(x+3*p,y+8*p,6*p,p);}else if(mood===1){ctx.fillStyle='#fa0';ctx.fillRect(x+2*p,y+5*p,2*p,1.5*p);ctx.fillRect(x+8*p,y+5*p,2*p,1.5*p);ctx.fillStyle='#ccc';ctx.fillRect(x+3*p,y+8*p,6*p,p);ctx.fillStyle='#88f';if(tick%20<10){ctx.fillRect(x,y+3*p,p,p);ctx.fillRect(x+sz-p,y+4*p,p,p);}}else{ctx.fillStyle='#f44';ctx.fillRect(x+2*p,y+5.5*p,2*p,p);ctx.fillRect(x+8*p,y+5.5*p,2*p,p);ctx.fillStyle='#aaf';ctx.fillRect(x+4*p,y+7*p,4*p,p);ctx.fillStyle='#aaf';if(tick%14<7){ctx.fillRect(x+p,y+8*p,p,2*p);ctx.fillRect(x+10*p,y+9*p,p,2*p);}}}function pct(){return timeLeft/maxTime;}function mood(){const p=pct();return p>0.55?0:p>0.25?1:2;}function nextQ(){curQ=QS[Math.floor(Math.random()*QS.length)];gridSel=[];slideX=0;held=0;answered=false;}function startGame(idx){selItem=idx;maxTime=ITEMS[idx].time;timeLeft=maxTime;score=0;scene='game';nextQ();}function soldOut(){sfxSoldOut();scene='soldout';}function drawTitle(){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);ctx.fillStyle='#f00';ctx.fillRect(30,20,420,55);ctx.fillStyle='#fff';ctx.font='bold 26px monospace';ctx.textAlign='center';ctx.fillText('SUPER ME CHALLENGE',W/2,52);ctx.fillStyle='#888';ctx.font='9px monospace';ctx.fillText('Super me  -  ONLINE SHOP',W/2,68);drawBalaclavaFull(20,75,2,blink%60<30?0:1);ctx.fillStyle='#ff0';ctx.font='11px monospace';ctx.textAlign='center';ctx.fillText('SELECT ITEM TO BUY:',W/2,88);const cols=['#0f0','#ff0','#f80'];ITEMS.forEach((it,i)=>{const iy=100+i*52;const sel=selItem===i;ctx.fillStyle=sel?'#1a1a1a':'#0d0d0d';ctx.fillRect(110,iy,350,46);ctx.strokeStyle=sel?it.color:'#333';ctx.lineWidth=sel?2:1;ctx.strokeRect(110,iy,350,46);ctx.font='22px monospace';ctx.textAlign='left';ctx.fillStyle='#fff';ctx.fillText(it.icon,118,iy+30);ctx.fillStyle=sel?'#fff':'#aaa';ctx.font='bold 12px monospace';ctx.fillText(it.name,148,iy+18);ctx.fillStyle=it.color;ctx.font='9px monospace';ctx.fillText(it.diff+' | TIME: '+it.time+'S',148,iy+32);ctx.fillStyle=sel?'#ff0':'#666';ctx.font='bold 11px monospace';ctx.textAlign='right';ctx.fillText(it.price,450,iy+18);if(sel){ctx.fillStyle='#f00';ctx.font='bold 12px monospace';ctx.textAlign='left';ctx.fillText('>',100,iy+26);}});ctx.fillStyle='#444';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText('* ALL DIFFICULTIES SHARE THE SAME 15 QUESTIONS',W/2,268);ctx.fillText('ONLY TIMER LENGTH DIFFERS BY DIFFICULTY',W/2,279);ctx.fillStyle=blink%40<20?'#ff0':'#664400';ctx.font='12px monospace';ctx.fillText('PRESS ENTER OR CLICK TO START',W/2,305);ctx.fillStyle='#222';ctx.font='9px monospace';ctx.fillText('VER:2.0  (C) SUPER ME INC.',W/2,520);}function drawGame(){ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);const p=pct();const bw=Math.floor(380*p);ctx.fillStyle='#222';ctx.fillRect(8,6,380,14);ctx.fillStyle=p>0.5?'#0d0':'#'+( p>0.25?'cc0':'f00');ctx.fillRect(8,6,bw,14);ctx.fillStyle='#555';ctx.font='8px monospace';ctx.textAlign='left';ctx.fillText('TIME',392,17);ctx.textAlign='right';ctx.fillText(Math.ceil(timeLeft)+'S',W-2,17);drawBalaclavaFace(W-44,2,20,mood());ctx.fillStyle='#1a1a1a';ctx.fillRect(10,25,W-20,H-35);ctx.fillStyle='#888';ctx.font='10px monospace';ctx.textAlign='left';ctx.fillText('reCAPTCHA',18,40);ctx.fillStyle='#333';ctx.font='8px monospace';ctx.fillText('SUPER ME SECURITY v3',18,52);if(curQ){const q=curQ;const lines=q.q.split('\n');ctx.fillStyle='#ddd';ctx.font='bold 11px monospace';ctx.textAlign='center';lines.forEach((l,i)=>ctx.fillText(l,W/2,70+i*14));ctx.fillStyle='#555';ctx.font='10px monospace';ctx.fillText('target: '+q.target,W/2,100);const gx=18,gy=108,gs=140,gp=4,cols=3;for(let i=0;i<9;i++){const c=i%cols,r=Math.floor(i/cols);const rx=gx+c*(gs+gp),ry=gy+r*(gs+gp);const sel=gridSel.includes(i);ctx.fillStyle=sel?'#223355':'#1e1e1e';ctx.fillRect(rx,ry,gs,gs);ctx.strokeStyle=sel?'#4af':'#333';ctx.lineWidth=sel?2:1;ctx.strokeRect(rx,ry,gs,gs);ctx.font=(gs*0.55)+'px monospace';ctx.textAlign='center';ctx.fillText(q.grid[i],rx+gs/2,ry+gs*0.72);}const vy=gy+3*(gs+gp)+6;ctx.fillStyle='#0af';ctx.fillRect(gx,vy,3*(gs+gp)-4,28);ctx.fillStyle='#000';ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.fillText('VERIFY',gx+(3*(gs+gp)-4)/2,vy+18);}ctx.fillStyle='#333';ctx.font='8px monospace';ctx.textAlign='left';ctx.fillText('SCORE:'+score,4,H-4);ctx.textAlign='right';ctx.fillText(ITEMS[selItem].icon+' '+ITEMS[selItem].name,W-4,H-4);if(flashTimer>0){const a=(flashTimer/18)*0.7;ctx.fillStyle='rgba(0,80,0,'+a+')';ctx.fillRect(0,0,W,H);ctx.fillStyle='#0f0';ctx.font='bold 20px monospace';ctx.textAlign='center';ctx.fillText('VERIFIED! +1',W/2,H/2);}}function drawSoldOut(){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);drawBalaclavaFull(W/2-32,30,2,2);ctx.fillStyle='#f00';ctx.fillRect(50,170,380,110);ctx.fillStyle='#fff';ctx.font='bold 52px monospace';ctx.textAlign='center';ctx.fillText('SOLD OUT',W/2,230);ctx.fillStyle='#888';ctx.font='11px monospace';ctx.fillText('TOO SLOW...',W/2,270);ctx.fillStyle='#ff0';ctx.font='14px monospace';ctx.fillText('SCORE: '+score+' VERIFIED',W/2,300);if(score>0){ctx.fillStyle='#0af';ctx.font='10px monospace';ctx.fillText('ENTER YOUR NAME FOR RANKING',W/2,330);}ctx.fillStyle=blink%40<20?'#ff0':'#553300';ctx.font='11px monospace';ctx.fillText(score>0?'PRESS ENTER TO CONTINUE':'PRESS ENTER TO RETRY',W/2,360);}function drawNameEntry(){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ff0';ctx.font='bold 16px monospace';ctx.textAlign='center';ctx.fillText('NEW RECORD!',W/2,80);ctx.fillText('SCORE: '+score,W/2,105);ctx.fillStyle='#888';ctx.font='11px monospace';ctx.fillText('DIFFICULTY: '+ITEMS[selItem].diff,W/2,125);ctx.fillStyle='#fff';ctx.font='12px monospace';ctx.fillText('ENTER YOUR NAME (3 CHARS):',W/2,160);ctx.fillStyle='#222';ctx.fillRect(150,175,180,44);ctx.strokeStyle='#ff0';ctx.lineWidth=2;ctx.strokeRect(150,175,180,44);ctx.fillStyle='#fff';ctx.font='bold 28px monospace';ctx.textAlign='center';ctx.fillText(nameInput.padEnd(3,'_'),W/2,207);ctx.fillStyle='#555';ctx.font='9px monospace';ctx.fillText('TYPE 3 CHARS THEN PRESS ENTER',W/2,240);}function drawRanking(){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);ctx.fillStyle='#f00';ctx.fillRect(40,20,400,40);ctx.fillStyle='#fff';ctx.font='bold 16px monospace';ctx.textAlign='center';ctx.fillText('RANKING - '+ITEMS[selItem].diff,W/2,45);if(!boardLoaded){ctx.fillStyle='#888';ctx.font='12px monospace';ctx.fillText('LOADING...',W/2,200);}else{board.forEach((e,i)=>{const y=80+i*30;ctx.fillStyle=i===0?'#ff0':i===1?'#ccc':i===2?'#c80':'#555';ctx.font='bold 12px monospace';ctx.textAlign='left';ctx.fillText((i+1)+'. '+e.name,60,y);ctx.textAlign='right';ctx.fillText(e.score,W-60,y);});if(!board.length){ctx.fillStyle='#444';ctx.font='11px monospace';ctx.textAlign='center';ctx.fillText('NO RECORDS YET',W/2,200);}}ctx.fillStyle=blink%40<20?'#ff0':'#553300';ctx.font='11px monospace';ctx.textAlign='center';ctx.fillText('PRESS ENTER TO PLAY AGAIN',W/2,440);}async function submitScore(name,sc,diff){try{await fetch(API+'/ranking',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,score:sc,difficulty:diff.toLowerCase()})});}catch(e){}}async function loadBoard(diff){boardLoaded=false;board=[];try{const r=await fetch(API+'/ranking?difficulty='+diff.toLowerCase());const j=await r.json();board=j.board||[];}catch(e){}boardLoaded=true;}function handleVerify(){if(!curQ||answered)return;const q=curQ;if(gridSel.length>0){score++;sfxOk();flashTimer=22;answered=true;setTimeout(nextQ,400);}else sfxFail();}let last=0;function loop(ts){tick++;blink++;const dt=(ts-last)/1000;last=ts;if(scene==='game'&&flashTimer<=0){timeLeft=Math.max(0,timeLeft-dt);if(timeLeft<=0)soldOut();}if(flashTimer>0)flashTimer--;requestAnimationFrame(loop);if(scene==='title')drawTitle();else if(scene==='game')drawGame();else if(scene==='soldout')drawSoldOut();else if(scene==='nameentry')drawNameEntry();else if(scene==='ranking')drawRanking();}requestAnimationFrame(loop);document.addEventListener('keydown',e=>{AC.resume();if(scene==='title'){if(e.key==='ArrowUp'||e.key==='ArrowLeft'){selItem=(selItem+2)%3;sfxSelect();}else if(e.key==='ArrowDown'||e.key==='ArrowRight'){selItem=(selItem+1)%3;sfxSelect();}else if(e.key==='Enter'){startGame(selItem);sfxSelect();}}else if(scene==='soldout'){if(e.key==='Enter'){if(score>0){nameInput='';scene='nameentry';}else scene='title';}}else if(scene==='nameentry'){if(e.key==='Backspace')nameInput=nameInput.slice(0,-1);else if(e.key==='Enter'&&nameInput.length>0){const n=nameInput.padEnd(3,'A').slice(0,3).toUpperCase();submitScore(n,score,ITEMS[selItem].diff);loadBoard(ITEMS[selItem].diff);scene='ranking';}else if(/^[A-Za-z0-9!@#]$/.test(e.key)&&nameInput.length<3)nameInput+=e.key.toUpperCase();}else if(scene==='ranking'){if(e.key==='Enter')scene='title';}else if(scene==='game'){if(e.key==='Enter'||e.key===' ')handleVerify();}});cv.addEventListener('click',e=>{AC.resume();const r=cv.getBoundingClientRect();const mx=(e.clientX-r.left)*(W/r.width);const my=(e.clientY-r.top)*(H/r.height);if(scene==='title'){ITEMS.forEach((it,i)=>{const iy=100+i*52;if(mx>=110&&mx<=460&&my>=iy&&my<=iy+46){if(selItem===i){startGame(i);sfxSelect();}else{selItem=i;sfxSelect();}}});}else if(scene==='game'&&curQ){const gx=18,gy=108,gs=140,gp=4;for(let i=0;i<9;i++){const c=i%3,r2=Math.floor(i/3);const rx=gx+c*(gs+gp),ry=gy+r2*(gs+gp);if(mx>=rx&&mx<=rx+gs&&my>=ry&&my<=ry+gs){const idx=gridSel.indexOf(i);if(idx>=0)gridSel.splice(idx,1);else gridSel.push(i);sfxTick();}}const vy=gy+3*(gs+gp)+6;if(mx>=gx&&mx<=gx+3*(gs+gp)-4&&my>=vy&&my<=vy+28)handleVerify();}else if(scene==='soldout'){if(score>0){nameInput='';scene='nameentry';}else scene='title';}else if(scene==='ranking')scene='title';});</script></body></html>
